services:
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-3003}:8000"
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:${APP_PORT:-3003}
      DB_DATABASE: /var/www/html/storage/database.sqlite
    volumes:
      - storage:/var/www/html/storage

volumes:
  storage:
